<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="fire department login page.css">
  <script src="https://kit.fontawesome.com/c48b71629b.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="wrapper">
    <form action="">
      <h1>Login
      </h1>
      <div class="input-box">
        <input type="text"placeholder="username"required>
        <i class="fa-solid fa-address-book"></i>
      </div>
      <div class="input-box">
        <input type="password"placeholder="password"required>
        <i class="fa-solid fa-lock"></i>
      </div>
      <div class="remember-forgot">
        <label>
          <input type="checkbox">Remember check 
        </label>
        <a href="#">forgot password</a> 
      </div>
      <button type="submit"class="btn"><a href="file department home page.html">login
      </button>
      </a>
      <div class="register-link">
        <p>Don't have an account?<a href="fire department register page.html">register</a></p>
      </div>
    </form>
  </div>
</body>

</html>
